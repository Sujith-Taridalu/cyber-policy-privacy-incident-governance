<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="Incident reporting flow">
  <rect width="1100" height="520" fill="#ffffff"/>
  <text x="550" y="45" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#111827">Incident Reporting &amp; Governance Flow</text>
  <text x="550" y="75" text-anchor="middle" font-family="Arial" font-size="15" fill="#4b5563">Sanitized decision path from detection to disclosure and improvement</text>

  <rect x="45" y="170" width="140" height="80" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="115" y="205" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Detect</text>
  <text x="115" y="228" text-anchor="middle" font-family="Arial" font-size="12" fill="#374151">Alert / Report</text>

  <rect x="235" y="170" width="140" height="80" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="305" y="205" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Triage</text>
  <text x="305" y="228" text-anchor="middle" font-family="Arial" font-size="12" fill="#374151">Scope / Impact</text>

  <rect x="425" y="170" width="140" height="80" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="495" y="205" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Review</text>
  <text x="495" y="228" text-anchor="middle" font-family="Arial" font-size="12" fill="#374151">Legal / Risk</text>

  <rect x="615" y="170" width="140" height="80" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="205" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Decide</text>
  <text x="685" y="228" text-anchor="middle" font-family="Arial" font-size="12" fill="#374151">Notify / Disclose</text>

  <rect x="805" y="170" width="140" height="80" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="875" y="205" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Recover</text>
  <text x="875" y="228" text-anchor="middle" font-family="Arial" font-size="12" fill="#374151">Restore / Improve</text>

  <line x1="185" y1="210" x2="235" y2="210" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="375" y1="210" x2="425" y2="210" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="565" y1="210" x2="615" y2="210" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="755" y1="210" x2="805" y2="210" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="330" width="600" height="80" rx="12" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="550" y="360" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700" fill="#1f2937">Governance checks throughout</text>
  <text x="550" y="388" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Evidence • Materiality • Customer Impact • Board Briefing • Lessons Learned</text>

  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker></defs>
</svg>
