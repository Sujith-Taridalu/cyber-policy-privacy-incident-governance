<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-label="Policy governance map">
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="500" y="45" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#111827">Policy, Privacy &amp; Governance Map</text>
  <text x="500" y="75" text-anchor="middle" font-family="Arial" font-size="15" fill="#4b5563">Public-safe portfolio view of incident, privacy, compliance, and governance themes</text>

  <rect x="70" y="125" width="240" height="105" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="190" y="160" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#1f2937">Incident Governance</text>
  <text x="190" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Triage • Reporting • Recovery</text>

  <rect x="380" y="125" width="240" height="105" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="500" y="160" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#1f2937">Framework Mapping</text>
  <text x="500" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Rules • Duties • Accountability</text>

  <rect x="690" y="125" width="240" height="105" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="810" y="160" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#1f2937">Privacy Analysis</text>
  <text x="810" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Data • Consent • Oversight</text>

  <rect x="225" y="310" width="240" height="105" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="345" y="345" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#1f2937">Compliance</text>
  <text x="345" y="375" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Controls • Evidence • Review</text>

  <rect x="535" y="310" width="240" height="105" rx="14" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="655" y="345" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#1f2937">Connected Systems</text>
  <text x="655" y="375" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Security • Privacy • Resilience</text>

  <line x1="310" y1="177" x2="380" y2="177" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="177" x2="690" y2="177" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="230" x2="365" y2="310" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="230" x2="635" y2="310" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="230" y="470" width="540" height="44" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="500" y="498" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700" fill="#1f2937">Outcome: governance judgment and executive-ready security communication</text>

  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker></defs>
</svg>
